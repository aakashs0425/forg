services:
  - type: web
    name: water-wise-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User must set this in the Render dashboard

  - type: web
    name: water-wise-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          type: web
          name: water-wise-backend
          envVarKey: RENDER_EXTERNAL_URL
        # Note: We append /api to the external URL for the frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
